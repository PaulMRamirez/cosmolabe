name: pages

# GitHub Pages deploy for the public validation page (docs/validation). The
# page shipped in Session 6 (docs/validation/index.html, generated from the
# committed tables by scripts/validation-page.mjs), so pushes to main deploy
# it; workflow_dispatch remains for manual redeploys and branch previews.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/validation/**'
      - '.github/workflows/pages.yml'

# The minimum a Pages deploy needs: read the repo, write the Pages artifact, mint
# the OIDC token deploy-pages verifies.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer run supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/configure-pages@v5
      - name: Assemble the validation page (stub)
        run: |
          mkdir -p _site
          # Placeholder until the validation harness populates docs/validation
          # with a built page. Once it does, this copies the generated site.
          if [ -f docs/validation/index.html ]; then
            cp -r docs/validation/. _site/
          else
            printf '%s\n' \
              '<!doctype html><meta charset="utf-8">' \
              '<title>Cosmolabe validation</title>' \
              '<h1>Cosmolabe validation report</h1>' \
              '<p>Not yet published. See docs/validation/README.md in the repository.</p>' \
              > _site/index.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
