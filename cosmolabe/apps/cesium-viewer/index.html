<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmolabe Cesium Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: monospace; }
    #cesiumContainer { width: 100%; height: 100%; }

    #info {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px;
      color: #888; font-size: 11px;
    }
    #info h3 { color: #4488ff; margin-bottom: 4px; font-size: 13px; }
    #status { color: #666; margin-top: 4px; }

    #live-indicator {
      position: absolute; top: 12px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px;
      font-size: 12px; font-family: monospace;
      display: flex; align-items: center; gap: 6px;
    }
    #live-indicator .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ff3333; animation: pulse-dot 1.5s ease-in-out infinite;
    }
    #live-indicator.connected .dot { background: #33ff33; }
    #live-indicator .text { color: #888; }
    #live-indicator.connected .text { color: #33ff33; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #body-list {
      position: absolute; top: 80px; left: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 6px;
      color: #ccc; font-size: 12px; min-width: 140px;
      max-height: calc(100vh - 260px); overflow-y: auto;
    }

    #telemetry-panel {
      position: absolute; top: 48px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.75); padding: 8px 14px; border-radius: 6px;
      font: 12px monospace; min-width: 170px;
      border-left: 2px solid rgba(0,255,136,0.3);
    }
    .telem-row { display: flex; justify-content: space-between; padding: 1px 0; }
    .telem-label { color: #666; margin-right: 12px; }
    .telem-val { color: #00ff88; text-align: right; }

    #comm-status {
      position: absolute; bottom: 50px; right: 12px; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 6px;
      font: 11px monospace; color: #888;
    }
    #comm-status .active { color: #00ffff; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <div id="info">
    <h3>Cosmolabe Cesium Demo</h3>
    <div>ISS orbit via TLE — @cosmolabe/cesium</div>
    <div id="status">Loading...</div>
  </div>

  <div id="body-list"></div>
  <div id="live-indicator" style="display:none"></div>
  <div id="comm-status"></div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
