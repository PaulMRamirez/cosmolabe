name: Deploy viewer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build viewer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache LFS objects
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: lfs-deploy-${{ hashFiles('apps/viewer/test-catalogs/**', 'docs/img/**', 'packages/spice/test-kernels/**') }}

      - name: Smudge LFS files
        # actions/checkout with lfs:false does not register the LFS smudge
        # filter — `git lfs install --local` makes it active. fetch then
        # downloads any missing OIDs (skipping those already in the restored
        # cache); checkout rewrites pointer files in the working tree.
        run: |
          git lfs install --local
          git lfs fetch
          git lfs checkout

      - name: Verify LFS smudge
        # Fail loudly if any tracked LFS file is still a pointer text file —
        # otherwise vite copies the 130-byte pointer into dist and browsers
        # serve plaintext under .jpg/.png URLs.
        run: |
          pointers=$(git lfs ls-files -n | xargs -I{} sh -c '
            f="$1"
            if [ -f "$f" ] && head -c 50 "$f" 2>/dev/null | grep -q "git-lfs.github.com"; then
              echo "$f"
            fi
          ' _ {})
          if [ -n "$pointers" ]; then
            echo "::error::Unsmudged LFS pointers found:"
            echo "$pointers"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Fetch Cassini kernels
        run: bash scripts/fetch-cassini-kernels.sh

      - name: Fetch LRO kernels
        run: bash scripts/fetch-lro-kernels.sh

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build viewer
        env:
          VITE_BASE: ${{ steps.pages.outputs.base_path }}
        working-directory: apps/viewer
        run: npx vite build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/viewer/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
